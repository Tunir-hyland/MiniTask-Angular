<div class="dash">

  <!-- Ambient glow blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <!-- ── Top nav bar ───────────────────────────────── -->
  <nav class="topbar">
    <div class="topbar-brand">
      <div class="brand-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
        </svg>
      </div>
      <span class="brand-name">Taskflow</span>
    </div>
    <div class="topbar-meta">
      <span class="meta-pill">
        <span class="pulse-dot"></span>
        Live
      </span>
    </div>
  </nav>

  <!-- ── Header ──────────────────────────────── -->
  <header class="hero">
    <div class="hero-text">
      <p class="hero-eyebrow">Overview</p>
      <h1 class="hero-title">Your Tasks</h1>
    </div>
    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-number">{{ tasks.length }}</div>
        <div class="kpi-label">Total</div>
      </div>
      <div class="kpi-divider"></div>
      <div class="kpi">
        <div class="kpi-number emerald">{{ completedCount }}</div>
        <div class="kpi-label">Completed</div>
      </div>
      <div class="kpi-divider"></div>
      <div class="kpi">
        <div class="kpi-number amber">{{ tasks.length - completedCount }}</div>
        <div class="kpi-label">Pending</div>
      </div>
    </div>
  </header>

  <!-- ── Progress bar ─────────────────────────────── -->
  <div class="progress-track" *ngIf="tasks.length > 0">
    <div class="progress-fill"
      [style.width.%]="(completedCount / tasks.length) * 100">
    </div>
  </div>

  <!-- ── Toolbar ───────────────────────────────────── -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="s-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input #searchBox class="s-input" type="text" [(ngModel)]="searchTerm" placeholder="Search tasks…">
      <button *ngIf="searchTerm" class="s-clear" (click)="clearSearch()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="count-tag" *ngIf="!loading">
      {{ tasks.filter(t => t.todo.toLowerCase().includes(searchTerm.toLowerCase())).length }} tasks
    </div>
  </div>

  <!-- ── Loading ───────────────────────────────────── -->
  <ng-container *ngIf="loading; else taskList">
    <div class="loading">
      <div class="ring"><div></div><div></div><div></div><div></div></div>
      <span>Loading tasks…</span>
    </div>
  </ng-container>

  <!-- ── Grid ─────────────────────────────────────── -->
  <ng-template #taskList>
    <div class="grid">
      <ng-container *ngFor="let task of tasks.filter(t => t.todo.toLowerCase().includes(searchTerm.toLowerCase())); let i = index">
        <app-task-details [task]="task" (deleteTask)="deleteTask($event)"></app-task-details>
      </ng-container>
    </div>

    <div class="empty" *ngIf="tasks.filter(t => t.todo.toLowerCase().includes(searchTerm.toLowerCase())).length === 0">
      <div class="empty-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <p class="empty-title">Nothing found</p>
      <p class="empty-sub">No tasks match “{{ searchTerm }}”</p>
    </div>
  </ng-template>

</div>
