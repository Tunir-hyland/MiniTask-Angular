<article class="card" [class.card-done]="task.completed" [class.card-pending]="!task.completed">

  <!-- Colored top stripe -->
  <div class="card-stripe"></div>

  <!-- ID badge + status -->
  <div class="card-top">
    <span class="task-num">#{{ task.id }}</span>
    <span class="badge" [class.badge-done]="task.completed" [class.badge-pending]="!task.completed">
      <span class="badge-dot"></span>
      {{ task.completed ? 'Completed' : 'Pending' }}
    </span>
  </div>

  <!-- Title -->
  <h3 class="card-title">{{ task.todo | titlecase }}</h3>

  <!-- Footer -->
  <div class="card-foot">
    <div class="user-chip">
      <div class="avatar">{{ task.userId }}</div>
      <span>User {{ task.userId }}</span>
    </div>
    <div class="actions">
      <button class="btn-view" [routerLink]="['/task', task.id]">
        View
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
      <button class="btn-del" (click)="onDelete()" title="Delete">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3,6 5,6 21,6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>
    </div>
  </div>

</article>
